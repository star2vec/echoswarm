services:
  neo4j:
    image: neo4j:5.26-community
    container_name: echoswarm-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/echoswarm

      # ── APOC plugin ───────────────────────────────────────────────────────
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"

      # ── Memory (tuned for a hackathon laptop) ─────────────────────────────
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "1g"
      NEO4J_server_memory_pagecache_size: "512m"

      # ── Routing query guard ───────────────────────────────────────────────
      # Allow shortestPath to traverse the full Valencia district graph
      NEO4J_dbms_cypher_hints__error: "false"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          wget -O /dev/null -q
          --header 'Authorization: Basic bmVvNGo6ZWNob3N3YXJt'
          http://localhost:7474
          || exit 1
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
